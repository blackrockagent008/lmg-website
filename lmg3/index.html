function generateId(){return'proj_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);}
let _serverProjectsCache=[];
function getProjectsIndex(){return _serverProjectsCache;}
function saveProjectsIndex(idx){_serverProjectsCache=idx;}

function updateIndexEntry(id,state){
  const idx=getProjectsIndex();
  const entry=idx.find(e=>e.id===id);
  if(entry){
    entry.name=state.project?.name||'Untitled';
    entry.type=state.project?.type||'';
    entry.city=state.project?.city||'';
    entry.state=state.project?.state||'';
    entry.status=state.project?.status||'Conceptual';
    entry.totalCost=totalCost();
    entry.keys=state.project?.rooms||0;
    entry.gsf=getGSF();
    entry.lastModified=new Date().toISOString();
    saveProjectsIndex(idx);
  }
}

function applyStateMigrations(s){
  if(!s||!s.divisions||!s.divisions.length)return null;
  if(s.divisions[0]&&s.divisions[0].divContingency===undefined)s.divisions.forEach(d=>{d.divContingency=10;});
  if(s.gcFee===undefined){s.gcFee=8;s.overhead=s.overhead||5;s.profit=s.profit||7;s.contingency=s.contingency||5;}
  if(s.showRanges===undefined)s.showRanges=false;
  if(!s.schedule)s.schedule={startDate:'',phases:[]};
  if(!s.actuals)s.actuals={};
  if(!s.changeOrders)s.changeOrders=[];
  if(!s.takeoffs)s.takeoffs=[];
  s.divisions.forEach(d=>d.items.forEach(it=>{if(!it.confidence)it.confidence='budgetary';}));
  return s;
}

async function openProject(id){
  // Try server first; if unavailable fall back to localStorage
  let serverData=null;
  try{serverData=await serverLoad(id);}catch(e){serverData=null;}
  if(serverData&&serverData.project){
    currentProjectId=id;
    S=applyStateMigrations(serverData)||getDefaultState();
    hideDashboard();init();
    return;
  }
  // Load from localStorage
  const raw=localStorage.getItem('lmg_project_'+id);
  if(raw){
    try{
      const localData=JSON.parse(raw);
      if(localData&&localData.divisions){
        currentProjectId=id;
        S=applyStateMigrations(localData)||getDefaultState();
        hideDashboard();init();
        return;
      }
    }catch(e){}
  }
  // Nothing found — start fresh
  currentProjectId=id;
  S=getDefaultState();
  hideDashboard();init();
  serverSave(id,S).catch(()=>{});
}

function newProject(){
  const id=generateId();
  currentProjectId=id;
  S=getBlankState();
  localStorage.setItem('lmg_project_'+id,JSON.stringify(S));
  const entry={
    id,name:'New Project',
    type:'',city:'',state:'TX',
    status:'Conceptual',
    totalCost:0,keys:0,gsf:0,
    lastModified:new Date().toISOString()
  };
  const idx=getProjectsIndex();
  idx.push(entry);
  saveProjectsIndex(idx);
  // Immediately push to server so it's protected from day 1
  serverSave(id,S).then(()=>setSaveStatus('server')).catch(()=>setSaveStatus('local'));
  hideDashboard();
  init();
}

function deleteProject(id){
  if(!confirm('Delete this project? This cannot be undone.'))return;
  localStorage.removeItem('lmg_project_'+id);
  const idx=getProjectsIndex().filter(e=>e.id!==id);
  saveProjectsIndex(idx);
  if(currentProjectId===id){currentProjectId=null;}
  serverDelete(id).catch(()=>{});
  renderDashboard();
}

function duplicateProject(id){
  const raw=localStorage.getItem('lmg_project_'+id);
  if(!raw)return;
  const newId=generateId();
  const state=JSON.parse(raw);
  state.project.name=(state.project.name||'Project')+' (Copy)';
  localStorage.setItem('lmg_project_'+newId,JSON.stringify(state));
  const idx=getProjectsIndex();
  const orig=idx.find(e=>e.id===id);
  if(orig){
    idx.push({...orig,id:newId,name:state.project.name,lastModified:new Date().toISOString()});
    saveProjectsIndex(idx);
  }
  renderDashboard();
}

function showDashboard(){
  currentProjectId=null;
  $('projectsDashboard').style.display='';
  document.querySelector('main').style.display='none';
  $('summaryBarWrap').style.display='none';
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  const pb=document.querySelector('[data-tab="projects"]');
  if(pb)pb.classList.add('active');
  const sb=$('saveBtn');if(sb)sb.style.display='none';
  renderDashboard(); // render from localStorage immediately
  // Then sync from server in background
  serverList().then(serverIdx=>{
    if(serverIdx&&serverIdx.length>0){
      // Merge: server is source of truth
      const localIdx=getProjectsIndex();
      const serverIds=new Set(serverIdx.map(e=>e.id));
      const localOnly=localIdx.filter(e=>!serverIds.has(e.id));
      const merged=[...serverIdx,...localOnly];
      saveProjectsIndex(merged);
      renderDashboard(); // re-render with server data
    }
  }).catch(()=>{});
}

function hideDashboard(){
  $('projectsDashboard').style.display='none';
  document.querySelector('main').style.display='';
  $('summaryBarWrap').style.display='';
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  const eb=document.querySelector('[data-tab="estimate"]');
  if(eb)eb.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(tc=>tc.classList.remove('active'));
  $('tabEstimate').classList.add('active');
  const sb=$('saveBtn');if(sb)sb.style.display='';
}

function renderDashboard(){
  const dash=$('projectsDashboard');
  const idx=getProjectsIndex();
  const filter=dash.dataset.filter||'All';
  const filterStatuses=['All','Conceptual','Bid','Awarded','Active','Complete','On Hold'];
  const filtered=filter==='All'?idx:idx.filter(e=>{
    const s=(e.status||'').toLowerCase().replace(/\s+/g,'');
    const f=filter.toLowerCase().replace(/\s+/g,'');
    return s===f;
  });

  function statusClass(st){
    return'dash-status dash-status-'+(st||'conceptual').toLowerCase().replace(/\s+/g,'');
  }
  function fmtCost(n){
    if(!n||n===0)return'$0';
    if(n>=1e6)return'$'+(n/1e6).toFixed(2)+'M';
    if(n>=1e3)return'$'+(n/1e3).toFixed(0)+'K';
    return'$'+Math.round(n).toLocaleString();
  }
  function fmtDate(d){
    if(!d)return'—';
    try{return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}catch(e){return'—';}
  }
  function fmtSF(n){
    if(!n)return'—';
    if(n>=1000)return(n/1000).toFixed(1)+'K SF';
    return n.toLocaleString()+' SF';
  }

  let html='<div class="dash-wrap">';
  // Header
  html+='<div class="dash-header">';
  html+='<div><div class="dash-title">Projects</div><div class="dash-subtitle">Manage your construction estimates</div></div>';
  html+='<button onclick="newProject()" class="btn btn-primary" style="font-size:14px;padding:12px 24px;border-radius:10px">+ New Project</button>';
  html+='</div>';

  // Filter tabs
  html+='<div class="dash-filters">';
  filterStatuses.forEach(s=>{
    html+='<button class="dash-filter-btn'+(filter===s?' active':'')+'" onclick="document.getElementById(\'projectsDashboard\').dataset.filter=\''+s+'\';renderDashboard()">'+s+(s!=='All'?' ('+idx.filter(e=>{const es=(e.status||'').toLowerCase().replace(/\s+/g,'');const fs=s.toLowerCase().replace(/\s+/g,'');return es===fs;}).length+')':'')+'</button>';
  });
  html+='</div>';

  // Grid or empty state
  if(filtered.length===0){
    html+='<div class="dash-empty"><div class="dash-empty-icon">📋</div><div class="dash-empty-text">';
    html+=filter==='All'?'No projects yet':'No '+filter+' projects';
    html+='</div><div class="dash-empty-sub">';
    html+=filter==='All'?'Click <strong>+ New Project</strong> to get started.':'Try a different filter or create a new project.';
    html+='</div></div>';
  } else {
    html+='<div class="dash-grid">';
    filtered.sort((a,b)=>new Date(b.lastModified||0)-new Date(a.lastModified||0)).forEach(p=>{
      html+='<div class="proj-card">';
      html+='<div class="proj-card-header"><div class="proj-card-name">'+((p.name||'Untitled').replace(/</g,'&lt;'))+'</div><span class="'+statusClass(p.status)+'">'+(p.status||'Conceptual')+'</span></div>';
      html+='<div class="proj-card-body">';
      if(p.type)html+='<div class="proj-card-meta">🏗️ '+(p.type.replace(/</g,'&lt;'))+'</div>';
      if(p.city||p.state)html+='<div class="proj-card-meta">📍 '+([p.city,p.state].filter(Boolean).join(', ').replace(/</g,'&lt;'))+'</div>';
      html+='<div class="proj-card-cost">'+fmtCost(p.totalCost)+'</div>';
      const details=[];
      if(p.keys)details.push(p.keys+' Keys');
      if(p.gsf)details.push(fmtSF(p.gsf));
      if(details.length)html+='<div class="proj-card-meta">'+details.join(' · ')+'</div>';
      html+='<div class="proj-card-meta" style="margin-top:6px;font-size:11px">Modified: '+fmtDate(p.lastModified)+'</div>';
      html+='</div>';
      html+='<div class="proj-card-footer">';
      html+='<button class="btn btn-secondary btn-sm" onclick="openProject(\''+p.id+'\')" style="flex:2">Open</button>';
      html+='<button class="btn btn-outline btn-sm" onclick="duplicateProject(\''+p.id+'\')" title="Duplicate">⧉</button>';
      html+='<button class="btn btn-sm" onclick="deleteProject(\''+p.id+'\')" title="Delete" style="background:#fee2e2;color:#dc2626;border:none">🗑</button>';
      html+='</div>';
      html+='</div>';
    });
    html+='</div>';
  }
  html+='</div>';
  dash.innerHTML=html;
}

function getContractTemplate(div){
  const winner=div?div.bids?.find(b=>b.winner&&b.vendor&&b.vendor.trim()):null;
  const amt=winner?.amount||(div?divTotal(div):0);
  return{id:Date.now()+'_'+Math.random().toString(36).substr(2,6),
    divNum:div?.num||'',divName:div?.name||'',
    subName:winner?.vendor||'',subPhone:'',subEmail:'',subLicense:'',
    contractDate:new Date().toISOString().slice(0,10),
    startDate:'',endDate:'',
    contractAmount:Math.round(amt),
    scopeNotes:winner?.scope||winner?.notes||'',
    drawCount:4,retainagePct:10,draws:[],
    retainageAmount:0,retainagePaidDate:'',retainageCheckNum:'',retainagePaid:false,
    status:'active',lienReleaseSigned:false,lienReleaseDate:'',notes:'',_expanded:false};
}

function buildDraws(c){
  const net=c.contractAmount*(1-c.retainagePct/100);
  c.retainageAmount=Math.round(c.contractAmount*c.retainagePct/100);
  const n=c.drawCount;
  const pcts=n===3?[35,35,30]:[25,25,25,25];
  const labs3=['Mobilization / Foundation','Rough-In & Framing','Substantial Completion'];
  const labs4=['Mobilization','Rough-In / 40% Complete','50–75% Complete','Substantial Completion'];
  const labs=n===3?labs3:labs4;
  c.draws=pcts.map((p,i)=>({num:i+1,label:labs[i]||'Draw '+(i+1),pct:p,
    amount:Math.round(net*p/100),dueDate:'',paidDate:'',checkNum:'',paidAmount:0,status:'pending'}));
}

function contractPaidTotal(c){
  const d=(c.draws||[]).filter(x=>x.status==='paid').reduce((s,x)=>s+(x.paidAmount||x.amount),0);
  return d+(c.retainagePaid?(c.retainageAmount||0):0);
}
function contractPctComplete(c){return c.contractAmount>0?Math.round(contractPaidTotal(c)/c.contractAmount*100):0;}

function toggleContract(ci){S.contracts[ci]._expanded=!S.contracts[ci]._expanded;saveState();refreshContract(ci);}
function refreshContract(ci){const o=document.querySelector('[data-contract-idx="'+ci+'"]');if(o)o.replaceWith(renderContractCard(S.contracts[ci],ci));}

function toggleDraw(ci,di){
  const d=S.contracts[ci].draws[di];
  d.status=d.status==='paid'?'pending':'paid';
  if(d.status==='paid'){if(!d.paidDate)d.paidDate=new Date().toISOString().slice(0,10);if(!d.paidAmount)d.paidAmount=d.amount;}
  saveState();refreshContract(ci);
}
function toggleRetainage(ci){
  const c=S.contracts[ci];c.retainagePaid=!c.retainagePaid;
  if(c.retainagePaid&&!c.retainagePaidDate)c.retainagePaidDate=new Date().toISOString().slice(0,10);
  saveState();refreshContract(ci);
}

function autoGenerateContracts(){
  if(!S.contracts)S.contracts=[];
  let added=0;
  S.divisions.forEach(div=>{
    const w=div.bids?.find(b=>b.winner&&b.vendor&&b.vendor.trim());if(!w)return;
    if(S.contracts.find(c=>c.divNum===div.num))return;
    const c=getContractTemplate(div);buildDraws(c);S.contracts.push(c);added++;
  });
  saveState();renderContractsTab();
  showToast(added>0?`Generated ${added} contract${added>1?'s':''} from bid winners`:'No new winners found — mark winners in Bids tab first','#10b981');
}
function addBlankContract(){
  if(!S.contracts)S.contracts=[];
  const c=getContractTemplate(null);buildDraws(c);c._expanded=true;S.contracts.push(c);saveState();renderContractsTab();
}
function deleteContract(ci){
  if(!confirm('Remove this contract?'))return;
  S.contracts.splice(ci,1);saveState();renderContractsTab();
}
