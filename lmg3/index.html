<!DOCTYPE html>
<html lang="en" class="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LMG Master Estimator — Commercial Construction</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={darkMode:'class',theme:{extend:{colors:{lmg:'#ff5e14','lmg-dark':'#e54d00',navy:'#00235a','navy-light':'#003380'}}}}</script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,-apple-system,sans-serif}
:root{--lmg:#ff5e14;--navy:#00235a;--surface:#ffffff;--surface-alt:#f8fafc;--border:#e2e8f0;--text:#1e293b;--text-sec:#64748b;--input-bg:#ffffff;--hover:#f1f5f9;--shadow:0 1px 3px rgba(0,0,0,.08);--green:#10b981;--yellow:#f59e0b;--red:#ef4444}
.dark{--surface:#0f172a;--surface-alt:#1e293b;--border:#334155;--text:#f1f5f9;--text-sec:#94a3b8;--input-bg:#1e293b;--hover:#334155;--shadow:0 1px 3px rgba(0,0,0,.3)}
.tab-btn{padding:10px 14px;border-radius:0;font-size:12px;font-weight:700;color:#666;background:transparent;border:none;border-bottom:3px solid transparent;cursor:pointer;transition:color .15s,border-color .15s;white-space:nowrap;letter-spacing:.02em;line-height:1}
.tab-btn:hover{color:#ccc}
.tab-btn.active{color:#ff5e14;border-bottom-color:#ff5e14;background:transparent}
.tab-content{display:none}.tab-content.active{display:block}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}
.card-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--lmg);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.field-label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-sec);margin-bottom:4px}
.field-input{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:var(--input-bg);color:var(--text);transition:border-color .2s}
.field-input:focus{outline:none;border-color:var(--lmg);box-shadow:0 0 0 3px rgba(255,94,20,.12)}
select.field-input{cursor:pointer}
.division-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--surface-alt);border:1px solid var(--border);border-radius:10px;cursor:pointer;user-select:none;transition:all .15s;margin-bottom:2px}
.division-header:hover{border-color:var(--lmg)}
.division-header.open{border-radius:10px 10px 0 0;border-bottom:none;background:var(--hover)}
.division-body{display:none;border:1px solid var(--border);border-top:none;border-radius:0 0 10px 10px;padding:16px;background:var(--surface);margin-bottom:8px;overflow-x:auto}
.division-body.open{display:block}
.est-table{width:100%;border-collapse:collapse;font-size:12px;min-width:700px}
.est-table th{text-align:left;padding:6px 6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text-sec);border-bottom:2px solid var(--border);white-space:nowrap}
.est-table td{padding:4px 6px;border-bottom:1px solid var(--border);vertical-align:middle}
.est-table tr:last-child td{border-bottom:none}
.est-table input{width:100%;padding:3px 6px;border:1px solid transparent;border-radius:4px;font-size:12px;background:transparent;color:var(--text);text-align:right}
.est-table input:hover{border-color:var(--border)}
.est-table input:focus{outline:none;border-color:var(--lmg);background:var(--input-bg)}
.est-table input.text-left{text-align:left}
.est-table .row-total{font-weight:600;color:var(--text)}
.div-total-row{background:var(--surface-alt);font-weight:700}
.div-total-row td{padding:8px 6px;border-top:2px solid var(--border)}
.summary-metric{text-align:center;padding:8px 12px}
.summary-metric .metric-value{font-size:20px;font-weight:800;color:var(--text)}
.summary-metric .metric-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-sec);margin-top:2px}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.badge-sd{background:#dbeafe;color:#1e40af}.dark .badge-sd{background:#1e3a5f;color:#93c5fd}
.badge-cd{background:#dcfce7;color:#166534}.dark .badge-cd{background:#14532d;color:#86efac}
.badge-bid{background:#fef3c7;color:#92400e}.dark .badge-bid{background:#78350f;color:#fcd34d}
.badge-con{background:#fee2e2;color:#991b1b}.dark .badge-con{background:#7f1d1d;color:#fca5a5}
.slider-wrap{display:flex;align-items:center;gap:8px}
.slider-wrap input[type=range]{flex:1;accent-color:var(--lmg);height:6px}
.slider-wrap .slider-val{min-width:44px;text-align:right;font-weight:700;font-size:14px;color:var(--text)}
.bid-table{width:100%;border-collapse:collapse;font-size:12px}
.bid-table th{padding:8px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-sec);border-bottom:2px solid var(--border)}
.bid-table td{padding:5px 8px;border-bottom:1px solid var(--border)}
.bid-table input,.bid-table textarea{width:100%;padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:var(--input-bg);color:var(--text)}
.bid-table textarea{resize:vertical;min-height:32px}
.bid-low{background:rgba(34,197,94,.08)}.dark .bid-low{background:rgba(34,197,94,.06)}
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--lmg);color:#fff}.btn-primary:hover{background:#e54d00}
.btn-secondary{background:var(--navy);color:#fff}.btn-secondary:hover{background:#003380}
.btn-outline{background:transparent;border:2px solid var(--border);color:var(--text)}.btn-outline:hover{border-color:var(--lmg);color:var(--lmg)}
.btn-danger{background:#dc2626;color:#fff}.btn-danger:hover{background:#b91c1c}
.btn-sm{padding:6px 14px;font-size:11px}
.add-row-btn{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;font-size:11px;font-weight:600;color:var(--lmg);background:transparent;border:1px dashed var(--lmg);border-radius:6px;cursor:pointer;margin-top:8px}
.add-row-btn:hover{background:rgba(255,94,20,.06)}
.chevron{transition:transform .15s;font-size:11px;color:var(--text-sec)}
.chevron.open{transform:rotate(90deg)}
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:10px;font-size:12px;font-weight:600;color:#fff;background:#10b981;box-shadow:0 4px 12px rgba(0,0,0,.15);z-index:9999;transform:translateY(80px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}
.conf-badge{cursor:pointer;font-size:14px;display:inline-block;width:24px;text-align:center;user-select:none;transition:transform .1s}
.conf-badge:hover{transform:scale(1.3)}
.range-text{font-size:10px;color:var(--text-sec);white-space:nowrap;margin-top:1px}
.upload-zone{border:2px dashed var(--border);border-radius:12px;padding:32px;text-align:center;cursor:pointer;transition:all .2s;background:var(--surface-alt)}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--lmg);background:rgba(255,94,20,.04)}
.upload-zone.drag-over{border-style:solid}
.plan-result{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;margin-bottom:6px;font-size:13px}
.plan-result.detected{background:rgba(16,185,129,.08);border-left:3px solid #10b981}
.plan-result.manual{background:rgba(245,158,11,.08);border-left:3px solid #f59e0b}
.bm-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center}
.bm-card .bm-val{font-size:22px;font-weight:800;color:var(--navy)}.dark .bm-card .bm-val{color:var(--lmg)}
.bm-card .bm-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-sec);margin-top:4px}
.bm-card .bm-range{font-size:11px;color:var(--text-sec);margin-top:2px}
.snap-card{background:var(--surface-alt);border:1px solid var(--border);border-radius:10px;padding:16px;position:relative}
.snap-card .snap-name{font-weight:700;font-size:14px;margin-bottom:6px}
.snap-card .snap-meta{font-size:11px;color:var(--text-sec)}
.snap-card .snap-total{font-size:18px;font-weight:800;color:var(--lmg);margin:8px 0}
.snap-del{position:absolute;top:124px;right:12px;background:none;border:none;color:var(--red);cursor:pointer;font-size:14px}

@media print{
  body{background:#fff!important;color:#000!important;font-size:10px}
  .no-print{display:none!important}
  .card{box-shadow:none;border:1px solid #ddd;page-break-inside:avoid}
  .division-body{display:block!important}
  .division-header{background:#f3f4f6!important}
  header,.summary-bar-wrap{position:static!important}
  .tab-content{display:block!important}
  #tabBids,#tabReports,#tabBenchmarks,#tabCompare,#tabSchedule,#tabPm,#tabForms{display:none!important}
  @page{margin:0.5in;size:letter}
}
@media(max-width:768px){
  .summary-grid{grid-template-columns:repeat(2,1fr)!important}
  .form-grid-4{grid-template-columns:1fr 1fr!important}
  .form-grid-3{grid-template-columns:1fr!important}
  .card{padding:14px}
  .tab-btn{padding:4px 10px;font-size:11px}
}

/* ===== PROJECTS DASHBOARD ===== */
#projectsDashboard{background:var(--surface-alt);min-height:calc(100vh - 84px)}
.dash-wrap{max-width:1400px;margin:0 auto;padding:32px 20px}
.dash-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:16px}
.dash-title{font-size:28px;font-weight:900;color:var(--navy);letter-spacing:.02em}.dark .dash-title{color:#f1f5f9}
.dash-subtitle{font-size:13px;color:var(--text-sec);margin-top:4px}
.dash-filters{display:flex;gap:6px;margin-bottom:24px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:4px}
.dash-filter-btn{padding:7px 16px;border-radius:20px;font-size:12px;font-weight:700;border:2px solid var(--border);background:transparent;color:var(--text-sec);cursor:pointer;white-space:nowrap;transition:all .15s}
.dash-filter-btn:hover{border-color:var(--lmg);color:var(--lmg)}
.dash-filter-btn.active{background:var(--lmg);color:#fff;border-color:var(--lmg)}
.dash-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
@media(max-width:1024px){.dash-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.dash-grid{grid-template-columns:1fr}}
.proj-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;box-shadow:var(--shadow);transition:border-color .15s,box-shadow .15s;display:flex;flex-direction:column}
.proj-card:hover{border-color:var(--lmg);box-shadow:0 4px 16px rgba(0,0,0,.1)}
.proj-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.proj-card-name{font-size:16px;font-weight:700;color:var(--text);line-height:1.3}
.proj-card-body{flex:1;margin-bottom:16px}
.proj-card-meta{font-size:12px;color:var(--text-sec);margin-bottom:4px}
.proj-card-cost{font-size:22px;font-weight:800;color:var(--lmg);margin:8px 0}
.proj-card-footer{display:flex;gap:8px;border-top:1px solid var(--border);padding-top:12px}
.proj-card-footer .btn{flex:1;justify-content:center;padding:8px 12px}
.dash-status{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
.dash-status-conceptual,.dash-status-sd{background:#dbeafe;color:#1e40af}.dark .dash-status-conceptual,.dark .dash-status-sd{background:#1e3a5f;color:#93c5fd}
.dash-status-dd,.dash-status-cd{background:#dcfce7;color:#166534}.dark .dash-status-dd,.dark .dash-status-cd{background:#14532d;color:#86efac}
.dash-status-bid{background:#fef3c7;color:#92400e}.dark .dash-status-bid{background:#78350f;color:#fcd34d}
.dash-status-awarded{background:#e0e7ff;color:#3730a3}.dark .dash-status-awarded{background:#312e81;color:#a5b4fc}
.dash-status-construction,.dash-status-active{background:#fee2e2;color:#991b1b}.dark .dash-status-construction,.dark .dash-status-active{background:#7f1d1d;color:#fca5a5}
.dash-status-complete{background:#d1fae5;color:#065f46}.dark .dash-status-complete{background:#064e3b;color:#6ee7b7}
.dash-status-onhold,.dash-status-on_hold{background:#f3f4f6;color:#374151}.dark .dash-status-onhold,.dark .dash-status-on_hold{background:#374151;color:#9ca3af}
.dash-empty{text-align:center;padding:80px 20px;color:var(--text-sec)}
.dash-empty-icon{font-size:48px;margin-bottom:16px}
.dash-empty-text{font-size:16px;font-weight:600;margin-bottom:8px}
.dash-empty-sub{font-size:13px}
#backToProjects{display:none}
</style>
</head>
<body class="min-h-screen transition-colors duration-200" style="background:var(--surface-alt);color:var(--text)">

<!-- LOGIN GATE -->
<div id="loginGate" style="display:flex;position:fixed;inset:0;z-index:9999;background:#0f172a;align-items:center;justify-content:center;padding:20px">
  <div style="background:#1e293b;border-radius:16px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 25px 60px rgba(0,0,0,.6)">
    <div style="text-align:center;margin-bottom:28px">
      <div style="font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:#ff5e14;margin-bottom:6px">LMG General Contractors</div>
      <div style="font-size:22px;font-weight:900;color:#f1f5f9">Master Estimator</div>
      <div style="font-size:12px;color:#64748b;margin-top:4px">Sign in to your account</div>
    </div>
    <div style="margin-bottom:14px">
      <label style="display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#94a3b8;margin-bottom:6px">Username</label>
      <input id="lgUser" type="text" autocomplete="username" placeholder="e.g. Adrian" style="width:100%;padding:12px 14px;border:1.5px solid #334155;border-radius:8px;background:#0f172a;color:#f1f5f9;font-size:14px;outline:none;box-sizing:border-box" onkeydown="if(event.key==='Enter')document.getElementById('lgPass').focus()">
    </div>
    <div style="margin-bottom:20px">
      <label style="display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#94a3b8;margin-bottom:6px">Password</label>
      <input id="lgPass" type="password" autocomplete="current-password" placeholder="••••••••" style="width:100%;padding:12px 14px;border:1.5px solid #334155;border-radius:8px;background:#0f172a;color:#f1f5f9;font-size:14px;outline:none;box-sizing:border-box" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div id="lgErr" style="display:none;background:#450a0a;color:#fca5a5;border-radius:8px;padding:10px 14px;font-size:13px;font-weight:600;margin-bottom:14px"></div>
    <button onclick="doLogin()" id="lgBtn" style="width:100%;padding:14px;background:#ff5e14;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:800;cursor:pointer;letter-spacing:.02em">Sign In →</button>
    <div style="margin-top:16px;text-align:center;font-size:11px;color:#475569">LMG General Contractors · Estimating Platform</div>
  </div>
</div>

async function apiCall(action,opts={}){
  if(action!=='login'&&!LMG_TOKEN){showLoginScreen();throw new Error('Not logged in');}
  try{
    const url=API_BASE+'?action='+action+(opts.id?'&id='+encodeURIComponent(opts.id):'');
    const res=await fetch(url,{method:opts.body?'POST':'GET',headers:{'X-LMG-Key':API_KEY,'X-LMG-Token':LMG_TOKEN,'Content-Type':'application/json'},body:opts.body?JSON.stringify(opts.body):undefined});
    if(!res.ok){let d=null;try{d=await res.json();}catch(_){}throw new Error(res.status+(d&&d.error?': '+d.error:''));}
    return await res.json();
  }catch(e){console.warn('API:',e.message);throw e;}
}

function getMult(){return(LOCATIONS.find(l=>l.key===S.locationKey)||{mult:1}).mult;}
function getGSF(){if(S.building.totalSFOverride>0)return S.building.totalSFOverride;return(S.building.length||0)*(S.building.width||0)*(S.building.stories||1);}
function getKeys(){return S.project.rooms||0;}

function itemSubtotal(it){return(it.qty||0)*(it.cost||0)*getMult();}
function itemLow(it){return itemSubtotal(it)*0.85;}
function itemHigh(it){return itemSubtotal(it)*1.15;}

function divSubtotal(div){return div.items.reduce((s,it)=>s+itemSubtotal(it),0);}
function divContAmt(div){return divSubtotal(div)*(div.divContingency||0)/100;}
function divTotal(div){return divSubtotal(div)+divContAmt(div);}
function divLaborCost(div){return divSubtotal(div)*(div.laborPct||50)/100;}
function divMaterialCost(div){return divSubtotal(div)*(100-(div.laborPct||50))/100;}

function hardCost(){return S.divisions.reduce((s,d)=>s+divTotal(d),0)*getMult();}
function totalCost(){const h=hardCost();return h*(1+S.gcFee/100+S.overhead/100+S.profit/100+S.contingency/100);}
function hardCostLow(){return S.divisions.reduce((s,d)=>s+divSubtotal(d)*0.85*(1+(d.divContingency||0)/100),0)*getMult();}
function hardCostHigh(){return S.divisions.reduce((s,d)=>s+divSubtotal(d)*1.15*(1+(d.divContingency||0)/100),0)*getMult();}
function totalCostLow(){const h=hardCostLow();return h*(1+S.gcFee/100+S.overhead/100+S.profit/100+S.contingency/100);}
function totalCostHigh(){const h=hardCostHigh();return h*(1+S.gcFee/100+S.overhead/100+S.profit/100+S.contingency/100);}
function perSF(){const g=getGSF();return g?totalCost()/g:0;}
function perKey(){const k=getKeys();return k?totalCost()/k:0;}
function markupPct(){return S.gcFee+S.overhead+S.profit+S.contingency;}

// ================================================================
if(typeof pdfjsLib!=='undefined'){
  pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}

async function parsePDF(file){
  if(typeof pdfjsLib==='undefined'){showToast('PDF.js not loaded — check connection','#ef4444');return null;}
  const ab=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:new Uint8Array(ab)}).promise;
  let text='';
  for(let i=1;i<=pdf.numPages;i++){
    const pg=await pdf.getPage(i);
    const tc=await pg.getTextContent();
    text+=tc.items.map(x=>x.str).join(' ')+'\n';
  }
  return analyzePlanText(text);
}

function analyzePlanText(text){
  const r={};const t=text.replace(/,/g,'');
  // Square footage
  // SF detection with sanity cap (max 2M SF)
  let m=t.match(/(\d{3,})\s*(?:sf|sq\.?\s*ft|square\s*feet|gsf|nsf)/i);
  if(!m)m=t.match(/(?:total|gross|building|floor)\s*(?:area|sf|square footage|square feet)[:\s]*(\d{3,})/i);
  if(m){const sfv=parseInt(m[1]);if(sfv<=2000000)r.sf={val:sfv,raw:m[0].trim()};}
  // Stories / floors
  m=t.match(/(\d{1,3})\s*(?:stor(?:y|ies)|floor[s]?|level[s]?)/i);
  if(!m)m=t.match(/(?:stor(?:y|ies)|floor[s]?|level[s]?)[:\s]*(\d{1,3})/i);
  if(m)r.stories={val:parseInt(m[1]),raw:m[0].trim()};
  // Rooms / keys / units — require >=2 to avoid door-schedule single keys
  m=t.match(/(\d{2,4})\s*(?:key[s]?|guestroom[s]?)/i);
  if(!m)m=t.match(/(\d{2,4})\s*(?:room[s]?|unit[s]?|suite[s]?)/i);
  if(!m)m=t.match(/(?:total|no\.?\s*of|number\s*of)\s*(?:key[s]?|room[s]?|unit[s]?)[:\s]*(\d{1,4})/i);
  if(!m)m=t.match(/(?:key[s]?|room[s]?|unit[s]?)[:\s]*(\d{2,4})/i);
  if(m){const v=parseInt(m[1]||m[2]);if(v>=2)r.rooms={val:v,raw:m[0].trim()};}
  // Structural type
  const struPat=/wood\s*frame|steel\s*(?:frame|structure)|concrete\s*(?:frame|structure)|masonry|tilt[- ]?up|pre[- ]?cast/i;
  m=t.match(struPat);
  if(m){
    let v=m[0].toLowerCase();
    if(v.includes('wood'))v='Wood Frame';
    else if(v.includes('steel'))v='Steel Frame';
    else if(v.includes('concrete')||v.includes('tilt')||v.includes('pre'))v='Concrete';
    else v='Masonry';
    r.structural={val:v,raw:m[0].trim()};
  }
  // HVAC tonnage from plans
  m=t.match(/(\d{1,4})\s*(?:-?\s*ton(?:s|ne)?|\bTR\b|t\.r\.)\s*(?:capacity|total|cooling|system|hvac)?/i);
  if(!m)m=t.match(/(?:total|cooling|system)\s*(?:capacity)?[:\s]*(\d{1,4})\s*(?:ton(?:s|ne)?|TR)/i);
  if(m){const v=parseInt(m[1]||m[2]);if(v>=1&&v<=9999)r.hvacTons={val:v,raw:m[0].trim()};}
  // HVAC type — expanded patterns
  const hvacPat=/\bptac\b|\bvrf\b|\bvrv\b|\bfcu\b|\bfan\s*coil\b|heat\s*pump|central\s*(?:hvac|air|system)|split\s*system|mini[- ]?split|rooftop\s*unit|\bahu\b|\bdoas\b|\bchilled\s*water\b/i;
  m=t.match(hvacPat);
  if(m){
    let v=m[0].toLowerCase();
    if(v.includes('ptac'))v='PTAC';
    else if(v.includes('vrf')||v.includes('vrv'))v='VRF';
    else if(v.includes('fcu')||v.includes('fan coil')||v.includes('chilled'))v='Fan Coil / Chilled Water';
    else if(v.includes('heat pump'))v='Heat Pump';
    else if(v.includes('split'))v='Split System';
    else v='Central';
    r.hvac={val:v,raw:m[0].trim()};
  }
  // Project name (title block only — requires explicit label; never guess from first line)
  m=t.match(/(?:project\s*name|project|building\s*name)[:\s]+([A-Za-z0-9][A-Za-z0-9\s&',.()-]{3,50})/i);
  if(m){const nm=m[1].trim();// reject if it looks like instructions/codes (all-caps garbage)
  if(!/^[A-Z\s\-]+$/.test(nm)&&nm.length>=4)r.projectName={val:nm,raw:m[0].trim()};}
  // Dimensions — skip standard paper/sheet sizes
  const PAPER_SIZES=[[8,11],[8,14],[11,17],[17,22],[22,34],[24,36],[30,42],[36,48]];
  const dimMatches=[...t.matchAll(/(\d{2,4})\s*['\u2032]?\s*[x×X]\s*(\d{2,4})\s*['\u2032]?/g)];
  for(const dm of dimMatches){
    const l=parseInt(dm[1]),w=parseInt(dm[2]);
    const isPaper=PAPER_SIZES.some(([a,b])=>(l===a&&w===b)||(l===b&&w===a));
    if(!isPaper&&l>10&&w>10&&l<=600&&w<=600){r.dimensions={length:l,width:w,raw:dm[0].trim()};break;}
  }

  return r;
}

function renderTabs(){
  const nav=$('tabNav');
  nav.innerHTML=TABS.map(t=>`<button class="tab-btn${t.id==='estimate'?' active':''}" data-tab="${t.id}">${t.label}</button>`).join('');
  nav.addEventListener('click',e=>{
    const btn=e.target.closest('[data-tab]');if(!btn)return;
    if(btn.dataset.tab==='projects'){showDashboard();return;}
    if(!currentProjectId){showDashboard();return;}
    hideDashboard();
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.tab-content').forEach(tc=>tc.classList.remove('active'));
    const id='tab'+btn.dataset.tab.charAt(0).toUpperCase()+btn.dataset.tab.slice(1);
    $(id).classList.add('active');
    if(btn.dataset.tab==='estimate'){renderEstimate();renderSummary();}
    if(btn.dataset.tab==='contracts')renderContractsTab();
    if(btn.dataset.tab==='reports')setTimeout(renderCharts,150);
    if(btn.dataset.tab==='benchmarks')setTimeout(renderBenchmarkCharts,150);
    if(btn.dataset.tab==='compare')renderCompareTab();
    if(btn.dataset.tab==='schedule')renderScheduleTab();
    if(btn.dataset.tab==='pm')renderPMTab();
    if(btn.dataset.tab==='forms')renderFormsTab();
  });
}

function renderSummary(){
  const h=hardCost(),t=totalCost(),sf=perSF(),k=perKey(),gsf=getGSF();
  const tgt=S.targetSF||0;
  const acSF=S.building.acSF||gsf;
  const sfForTarget=acSF||gsf;
  const sfCur=sfForTarget?t/sfForTarget:0;
  let tgtHtml='';
  if(tgt>0&&sfForTarget>0){
    const pct=((sfCur-tgt)/tgt*100);
    const over=sfCur>tgt;
    const color=over?(Math.abs(pct)>15?'#ef4444':'#f59e0b'):'#10b981';
    const arrow=over?'↑':'↓';
    tgtHtml=`<div class="summary-metric" style="border:2px solid ${color};border-radius:8px;padding:4px 8px"><div class="metric-value" style="color:${color}">${fmt(sfCur)} ${arrow}</div><div class="metric-label">$/SF vs $${tgt} target (${over?'+':''}${pct.toFixed(0)}%)</div></div>`;
  }
  const statusBadge={Conceptual:'badge-sd',SD:'badge-sd',DD:'badge-cd',CD:'badge-cd',Bid:'badge-bid',Construction:'badge-con'};
  const badge=statusBadge[S.project.status]||'badge-sd';
  $('summaryBar').innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap">
      <div class="summary-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:4px;align-items:center;flex:1">
        <div class="summary-metric"><div class="metric-value" style="color:var(--lmg)">${fmtN(t)}</div><div class="metric-label">Total Project</div></div>
        <div class="summary-metric"><div class="metric-value">${fmtN(h)}</div><div class="metric-label">Hard Cost</div></div>
        ${tgtHtml||`<div class="summary-metric"><div class="metric-value">${fmt(sf)}</div><div class="metric-label">$ / SF</div></div>`}
        <div class="summary-metric"><div class="metric-value">${(sfForTarget/1000).toFixed(1)}K</div><div class="metric-label">A/C SF</div></div>
        <div class="summary-metric"><div class="metric-value">${getMult().toFixed(2)}x</div><div class="metric-label">Location</div></div>
        <div class="summary-metric"><span class="badge ${badge}">${S.project.status}</span><div class="metric-label" style="margin-top:4px">Status</div></div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
        <div style="display:flex;align-items:center;gap:4px"><span style="font-size:10px;font-weight:700;color:var(--text-sec)">TARGET $/SF</span><input type="number" value="${tgt||''}" placeholder="200" style="width:64px;padding:4px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-weight:700;background:var(--input-bg);color:var(--text)" onchange="S.targetSF=Number(this.value);renderSummary();saveState()"></div>
        <button onclick="window.print()" style="padding:8px 14px;background:#111;color:#fff;border:none;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer">🖨 Print</button>
        <button onclick="exportCSV()" style="padding:8px 14px;background:#00235a;color:#fff;border:none;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer">📄 CSV</button>
      </div>
    </div>`;
  $('projectLabel').textContent=S.project.name||'New Project';
}

function loadPdfFromUrl(){
  const input=$('pdfUrlInput');
  if(!input||!input.value.trim()){showToast('Paste a URL first','#ef4444');return;}
  handlePDFUrl(input.value.trim());
}

function smartLoadUrl(){
  const input=$('pdfUrlInput');
  if(!input||!input.value.trim()){showToast('Paste a URL first','#ef4444');return;}
  const url=input.value.trim();
  // If clearly a direct PDF link, load it directly; otherwise scan for PDFs
  if(url.toLowerCase().includes('.pdf')&&!url.includes('drive.google.com/drive/folders')){
    handlePDFUrl(url);
  } else {
    scanPageForPDFs();
  }
}

async function scanPageForPDFs(){
  const input=$('pdfUrlInput');
  if(!input||!input.value.trim()){showToast('Paste a URL first','#ef4444');return;}
  const url=input.value.trim();
  const container=$('planResultsContainer');
  if(container)container.innerHTML='';
  showToast('Scanning page for PDFs…','#6366f1');
  try{
    // Try direct fetch, fall back to CORS proxy
    let html='';
    try{const r=await fetch(url);html=await r.text();}catch(_){
      try{const r2=await fetch('https://corsproxy.io/?url='+encodeURIComponent(url));html=await r2.text();}catch(e2){throw e2;}
    }
    const parser=new DOMParser();
    const doc=parser.parseFromString(html,'text/html');
    const seen=new Set();
    const pdfLinks=[];
    doc.querySelectorAll('a[href]').forEach(a=>{
      try{
        const href=new URL(a.href,url).href;
        if((href.toLowerCase().includes('.pdf'))&&!seen.has(href)){
          seen.add(href);
          pdfLinks.push({url:href,text:(a.textContent.trim()||'Floor Plan PDF').slice(0,80)});
        }
      }catch(e){}
    });
    if(pdfLinks.length>0){
      let html2=`<div style="padding:12px;border-radius:8px;background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.2)">`;
      html2+=`<div style="font-size:12px;font-weight:700;color:#6366f1;margin-bottom:8px">📄 Found ${pdfLinks.length} PDF file${pdfLinks.length>1?'s':''} — click to analyze:</div>`;
      pdfLinks.forEach(p=>{

async function handlePDFUrl(url){
  const container=$('planResultsContainer');
  if(container)container.innerHTML='';
  $('uploadZone').style.display='none';
  $('pdfProgress').style.display='block';
  const pm=$('pdfProgressMsg');
  if(pm)pm.innerHTML='⏳ Loading PDF from URL...';
  try{
    // Convert known sharing URLs to direct download URLs
    let directUrl=url.trim();
    // Google Drive: https://drive.google.com/file/d/FILE_ID/view → direct download
    const gdMatch=directUrl.match(/drive\.google\.com\/file\/d\/([^/\?]+)/);
    if(gdMatch){directUrl='https://drive.google.com/uc?export=download&id='+gdMatch[1];}
    // Dropbox: dl=0 → dl=1, or use dl.dropboxusercontent.com
    if(directUrl.includes('dropbox.com')){
      directUrl=directUrl.replace('www.dropbox.com','dl.dropboxusercontent.com').replace('?dl=0','').replace('&dl=0','');
    }
    if(pm)pm.innerHTML='⏳ Downloading PDF...';
    let blob=null;
    try{
      const resp=await fetch(directUrl);
      if(!resp.ok)throw new Error('HTTP '+resp.status);
      blob=await resp.blob();
    }catch(e){
      // CORS or network error — retry via proxy
      if(pm)pm.innerHTML='⏳ Routing through proxy...';
      const proxies=['https://corsproxy.io/?url=','https://api.allorigins.win/raw?url='];
      for(const px of proxies){
        try{
          const r2=await fetch(px+encodeURIComponent(directUrl));
          if(r2.ok){blob=await r2.blob();break;}
        }catch(_){}
      }
      if(!blob)throw new Error('CORS blocked — could not load via proxy either');
    }
    const file=new File([blob],'floor_plan.pdf',{type:'application/pdf'});
    $('pdfProgress').style.display='none';
    $('uploadZone').style.display='block';
    await handlePDFFile(file);
  }catch(err){
    $('pdfProgress').style.display='none';
    $('uploadZone').style.display='block';
    showToast('Load failed: '+err.message+' — try downloading and uploading directly','#ef4444');
  }
}

async function analyzeWithVision(file){
  const pm=$('pdfProgressMsg');
  $('uploadZone').style.display='none';
  $('pdfProgress').style.display='block';
  if(pm)pm.innerHTML='🧠 Claude AI is reading your plans...<br><span style="font-size:12px;opacity:.8">Analyzing title block, floor plan, notes...</span>';
  const vBtn=$('aiVisionBtn');if(vBtn)vBtn.style.display='none';
  try{
    // Render first page of PDF to canvas
    const arrayBuf=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:arrayBuf}).promise;
    const page=await pdf.getPage(1);
    const vp=page.getViewport({scale:2.0});
    const canvas=document.createElement('canvas');
    canvas.width=vp.width;canvas.height=vp.height;
    await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
    // Convert to base64
    const b64=canvas.toDataURL('image/png').split(',')[1];
    // AI Vision analysis (server feature — skipped in standalone mode)
    const json={ok:false,data:null};
    if(!json.ok||!json.data){showToast('AI Vision not available in standalone mode — text parse only','#6366f1');throw new Error('Standalone mode — vision skipped');}
    const d=json.data;
    // Merge vision data with existing text parse results
    const enhanced=Object.assign({},planResults);
    if(d.floorCount&&d.floorCount>0)enhanced.stories={val:d.floorCount,raw:'AI Vision'};
    if(d.perFloorSF&&d.perFloorSF>0&&d.perFloorSF<500000)enhanced.sf={val:d.perFloorSF,raw:'AI Vision'};
    if(d.roomCount&&d.roomCount>0)enhanced.rooms={val:d.roomCount,raw:'AI Vision'};
    if(d.structuralType)enhanced.structural={val:d.structuralType,raw:'AI Vision'};
    if(d.hvacType)enhanced.hvac={val:d.hvacType,raw:'AI Vision'};
    if(d.projectName)enhanced.projectName={val:d.projectName,raw:'AI Vision'};
    enhanced._visionNotes=d.notes||'';
    enhanced._visionConfidence=d.confidence||'medium';
    planResults=enhanced;
    $('pdfProgress').style.display='none';
    $('uploadZone').style.display='block';
    const container=$('planResultsContainer');
    if(container)container.innerHTML=buildPlanResultsHTML(enhanced);
    // Add note about confidence
    const note=document.createElement('div');
    note.style.cssText='margin-top:8px;padding:8px 12px;background:rgba(99,102,241,.08);border-radius:8px;font-size:11px;color:#6366f1;border:1px solid rgba(99,102,241,.2)';
    note.innerHTML=`🧠 <strong>Claude Vision</strong> (${d.confidence||'medium'} confidence)${d.notes?` — ${d.notes}`:''}. Always verify before applying.`;
    if(container)container.appendChild(note);
    showToast('AI Vision complete — '+d.confidence+' confidence','#6366f1');
  }catch(err){
    $('pdfProgress').style.display='none';
    $('uploadZone').style.display='block';
    // AI Vision not available on this host — text parse results remain intact
    showToast('AI Vision unavailable on this server \u2014 use text-parsed values above','#f59e0b');
    // Re-show the text parse results if we had them
    const container=$('planResultsContainer');
    if(container&&planResults&&Object.keys(planResults).length){
      container.innerHTML=buildPlanResultsHTML(planResults);
    }
  }
}

  return html;

function applyFromCorrectionPanel(){

  const rooms=Number(document.getElementById('cp_rooms')?.value)||0;

  const hvac=document.getElementById('cp_hvac')?.value||S.building.hvac;
  const name=document.getElementById('cp_name')?.value||S.project.name;
  // Guard: require stories if SF is set
  if(sf>0&&stories<1){showToast('\u26A0\uFE0F Enter number of floors before applying','#ef4444');document.getElementById('cp_stories')?.focus();return;}
  if(sf>0&&stories>0&&sf*stories>2000000){showToast('\u26A0\uFE0F Total GSF ('+(sf*stories).toLocaleString()+') exceeds 2M SF \u2014 check SF/floor and floors','#ef4444');return;}
  const corrected={
    sf:sf>0?{val:sf,raw:'user-verified'}:null,
    stories:stories>0?{val:stories,raw:'user-verified'}:null,
    rooms:rooms>0?{val:rooms,raw:'user-verified'}:null,
    structural:{val:structural,raw:'user-verified'},
    hvac:{val:hvac,raw:'user-verified'},
    projectName:name?{val:name,raw:'user-verified'}:null
  };
  applyPlanResults(corrected);
  document.getElementById('planCorrectionPanel')?.remove();
  renderEstimate();
  renderSummary();
}


function applyPlanResults(r){
  if(r.projectName)S.project.name=r.projectName.val;
  if(r.rooms)S.project.rooms=r.rooms.val;
  if(r.stories)S.building.stories=r.stories.val;
  if(r.structural)S.building.structural=r.structural.val;
  if(r.hvac)S.building.hvac=r.hvac.val;
  // SF detected = PER-FLOOR footprint (from architectural plan sheet showing one floor)
  // Total GSF = sf × stories
  if(r.sf&&r.sf.val>0){
    const stories=S.building.stories||1;
    const perFloor=r.sf.val; // plan sheet SF = footprint of one floor
    const totalGSF=perFloor*stories;
    // VALIDATE BEFORE STORING — never store an absurd GSF
    if(totalGSF>0&&totalGSF<=2000000){
      // Back-calculate L × W from per-floor footprint
      S.building.width=Math.round(Math.sqrt(perFloor/1.5));
      S.building.length=Math.round(perFloor/Math.max(1,S.building.width));
      S.building.totalSFOverride=totalGSF;
      showToast(perFloor.toLocaleString()+' SF/floor × '+stories+' stories = '+totalGSF.toLocaleString()+' total GSF ✓','#10b981');
    } else if(totalGSF>2000000){
      // Don't store — ask user to fix stories in the panel
      showToast('⚠️ GSF too large ('+totalGSF.toLocaleString()+') — verify floors in EDIT & APPLY panel','#ef4444');
    } else if(stories<1){
      showToast('⚠️ Enter number of floors in EDIT & APPLY panel first','#f59e0b');
    }
  } else if(r.dimensions&&r.dimensions.length<=600&&r.dimensions.width<=600){
    const projected=r.dimensions.length*r.dimensions.width*(S.building.stories||1);
    if(projected<=2000000){
      S.building.length=r.dimensions.length;S.building.width=r.dimensions.width;
    } else {
      showToast('Detected dimensions too large — enter SF manually','#f59e0b');
    }
  }
  // Auto-update HVAC + electrical quantities based on room count
  if(r.rooms){
    const rooms=r.rooms.val;
    S.divisions.forEach(div=>{
      div.items.forEach(it=>{
        const d=it.desc.toLowerCase();
        if(d.includes('ptac')||d.includes('guestroom')){it.qty=rooms;}
        if(d.includes('bathroom exhaust')||d.includes('bath exhaust')){it.qty=rooms;}
        if(d.includes('lighting (guestroom')||d.includes('lighting (guest')){it.qty=rooms;}
      });
    });
  }
  // Tonnage hint using correct rule per project type
  if(r.sf&&!r.hvacTons){
    const type=(S.project.type||'').toLowerCase();
    const isRes=type.includes('resid')||type.includes('home')||type.includes('single')||type.includes('house')||type.includes('condo')||type.includes('villa');
    const sfPerTon=isRes?450:300;
    const tons=Math.round(r.sf.val/sfPerTon);
    showToast(`Plan applied ✓ — HVAC ~${tons} tons (1 ton/${sfPerTon} SF ${isRes?'residential':'commercial'})`);
  } else if(r.hvacTons){
    showToast(`Plan applied ✓ — HVAC ${r.hvacTons.val} tons detected`);
  } else {
    showToast('Plan values applied ✓');
  }
  refreshAll();saveState();
}

function autoFillFromSF(){
  const gsf=getGSF();if(!gsf){showToast('Enter Length × Width first','#f59e0b');return;}
  // Safety guard — if project already has real costs entered, ask before wiping
  const existingCost=hardCost();
  if(existingCost>0){
    if(!confirm('⚠️ This will recalculate ALL line item quantities from SF benchmarks and overwrite your current numbers.\n\nAre you sure? This cannot be undone.'))return;
  }
  const acSF=S.building.acSF||gsf;  // conditioned SF (default to total if not set)
  const nonAcSF=S.building.nonAcSF||0;
  const totalSF=acSF+nonAcSF||gsf;
  const rooms=S.project.rooms||0;
  const stories=S.building.stories||1;
  const foot=Math.round(totalSF/stories);
  const perim=Math.round(Math.sqrt(foot)*4);
  S.divisions.forEach(div=>{
    div.items.forEach(it=>{
      const d=it.desc.toLowerCase(),u=it.unit;
      if(u==='LS'){it.qty=1;return;}
      if(u==='RM'||d.includes('guestroom')){if(rooms>0)it.qty=rooms;return;}
      if(u==='MO'){it.qty=Math.max(4,Math.min(24,Math.round(gsf/3000+stories*1.5)));return;}
      if(u==='SF'){
        // Structure/roof → use totalSF; Finishes/HVAC/MEP → use acSF only
        if(d.includes('slab on grade'))it.qty=foot;
        else if(d.includes('elevated deck'))it.qty=Math.round(totalSF-foot);
        else if(d.includes('exterior wall')||d.includes('ext.*wall')||d.includes('cmu wall'))it.qty=Math.round(perim*stories*9);
        else if(d.includes('interior wall'))it.qty=Math.round(acSF*0.8);          // conditioned only
        else if(d.includes('roofing')||d.includes('roof'))it.qty=Math.round(foot*1.1); // full footprint
        else if(d.includes('insulation'))it.qty=Math.round(totalSF*1.1);           // whole building envelope
        else if(d.includes('drywall')||d.includes('gyp'))it.qty=Math.round(acSF*2.5);  // A/C space only
        else if(d.includes('tile'))it.qty=Math.round(acSF*0.3);                    // A/C space
        else if(d.includes('flooring')||d.includes('carpet')||d.includes('floor'))it.qty=Math.round(acSF*0.85); // A/C space
        else if(d.includes('paint')||d.includes('interior paint'))it.qty=Math.round(acSF*2.5); // A/C space
        else if(d.includes('exterior paint')||d.includes('ext.*coat'))it.qty=Math.round(perim*stories*9);
        else if(d.includes('branch')||d.includes('wiring'))it.qty=Math.round(totalSF); // whole building
        else it.qty=Math.round(acSF); // default to conditioned SF
        return;
      }
      if(u==='EA'){
        if(d.includes('window'))it.qty=Math.max(1,Math.round(gsf/80));
        else if(d.includes('bathroom exhaust')||d.includes('exhaust fan'))it.qty=rooms||Math.round(gsf/200);
        else if(d.includes('door')&&!d.includes('hardware'))it.qty=Math.max(1,Math.round(gsf/120));
        else if(d.includes('elevator'))it.qty=stories>3?1:0;
        else if(d.includes('generator'))it.qty=1;
        else if(d.includes('ev charging'))it.qty=0;
        else it.qty=1;
        return;
      }
      if(u==='LF'){
        if(d.includes('grade beam')||d.includes('perimeter'))it.qty=perim;
        else if(d.includes('railing')||d.includes('handrail'))it.qty=stories>1?Math.round(perim*stories):0;
        else if(d.includes('pipe')||d.includes('drain'))it.qty=Math.round(gsf/10);
        else it.qty=perim;
        return;
      }
      if(u==='CY'){it.qty=Math.round(foot*2/27);return;}
      if(u==='TN'){it.qty=Math.round(gsf/400);return;}
      if(u==='FLT'){it.qty=stories>1?stories-1:0;return;}
    });
  });
  // Calibrate: scale all costs so hardCost() hits the industry benchmark for this building type
  {
    const gcMult=(1+S.gcFee/100+S.overhead/100+S.profit/100+S.contingency/100);
    const perKey={'Hotel Select Service':97500,'Hotel Extended Stay':110000,'Hotel Full Service':205000,'Multifamily':140000,'Residential':175000};
    const perSF={'Retail Strip':150,'Retail Pad':170,'Office':200,'Industrial':100,'Mixed-Use':190,'Historic Renovation':280};
    let targetHC=0;
    if(rooms>0&&perKey[S.project.type]){
      targetHC=(perKey[S.project.type]*rooms)/gcMult;
    } else if(perSF[S.project.type]){
      targetHC=(perSF[S.project.type]*gsf)/gcMult;
    } else {
      const sfRange=SF_RANGES[S.project.type]||[150,300];
      targetHC=(((sfRange[0]+sfRange[1])/2)*gsf)/gcMult;
    }
    // Apply location multiplier to target (hardCost already includes getMult internally)
    targetHC*=getMult();
    const currentHC=hardCost();
    if(currentHC>0&&targetHC>0){
      const factor=targetHC/currentHC;
      S.divisions.forEach(d=>d.items.forEach(it=>{it.cost=Math.round(it.cost*factor*100)/100;}));
    }
  }
  refreshAll();saveState();
  showToast(`Auto-estimated — ${acSF.toLocaleString()} A/C SF + ${nonAcSF.toLocaleString()} non-A/C SF ✓`,'#10b981');
}

function attachDivisionEvents(body,div,di){
  body.addEventListener('input',e=>{
    const key=e.target.dataset.item;
    if(key){const[d,i,f]=key.split('.');const item=S.divisions[+d].items[+i];
      if(f==='qty'||f==='cost'){
        item[f]=Number(e.target.value)||0;
        const row=e.target.closest('tr');
        if(row){const tc=row.querySelector('.row-total');if(tc)tc.textContent=fmt(itemSubtotal(item));}
        const divWrap=body.closest('[data-div-index]');
        if(divWrap){
          const dt=divTotal(S.divisions[+d]);const hc=hardCost();
          const amtEl=divWrap.querySelector('.div-amt');const pctEl=divWrap.querySelector('.div-pct');
          if(amtEl)amtEl.textContent=fmt(dt);
          if(pctEl)pctEl.textContent=hc>0?((dt/hc)*100).toFixed(1)+'%':'0.0%';
        }
        renderSummary();refreshGrandTotal();
      }else item[f]=e.target.value;
      saveState();return;}
    const bk=e.target.dataset.bid;
    if(bk){const[d,b,f]=bk.split('.');const bid=S.divisions[+d].bids[+b];
      if(f==='amount')bid[f]=Number(e.target.value)||0;else bid[f]=e.target.value;saveState();return;}
    const lk=e.target.dataset.laborDi;
    if(lk!==undefined){S.divisions[+lk].laborPct=Number(e.target.value);saveState();return;}
    const ck=e.target.dataset.contDi;
    if(ck!==undefined){S.divisions[+ck].divContingency=Number(e.target.value)||0;renderSummary();refreshGrandTotal();saveState();}
  });
  body.addEventListener('change',e=>{
    // Recalculate row totals + division footer when qty/cost fields change
    const key=e.target.dataset.item;
    if(key){const[d,i,f]=key.split('.');if(f==='qty'||f==='cost'){refreshDivision(+d);renderSummary();refreshGrandTotal();}return;}
    const bw=e.target.dataset.bidwin;
    if(bw){const[d,b]=bw.split('.');S.divisions[+d].bids.forEach((bid,idx)=>bid.winner=(idx===+b));saveState();}
  });
  body.addEventListener('click',e=>{
    const ar=e.target.dataset.addrow;
    if(ar!==undefined){S.divisions[+ar].items.push(I('New Item','LS',0,0,''));refreshDivision(+ar);saveState();return;}
    const dr=e.target.dataset.delrow;
    if(dr){const[d,i]=dr.split('.');S.divisions[+d].items.splice(+i,1);refreshDivision(+d);renderSummary();refreshGrandTotal();saveState();return;}
    const tb=e.target.dataset.togglebids;
    if(tb!==undefined){S.divisions[+tb].showBids=!S.divisions[+tb].showBids;refreshDivision(+tb);saveState();return;}
    const cf=e.target.dataset.conf;
    if(cf){
      const[d,i]=cf.split('.');const item=S.divisions[+d].items[+i];
      const idx=CONF_CYCLE.indexOf(item.confidence);
      item.confidence=CONF_CYCLE[(idx+1)%3];
      e.target.textContent=CONF_LABELS[item.confidence];
      e.target.title=CONF_NAMES[item.confidence];
      saveState();
    }
  });
}

function refreshDivision(di){
  const wrap=document.querySelector(`[data-div-index="${di}"]`);if(!wrap)return;
  const newWrap=renderDivision(S.divisions[di],di);wrap.replaceWith(newWrap);
}

function refreshGrandTotal(){

}

function refreshAll(){renderSummary();renderEstimate();}

function getSnapshots(){try{return JSON.parse(localStorage.getItem(SNAP_KEY))||[];}catch(e){return[];}}
function setSnapshots(snaps){localStorage.setItem(SNAP_KEY,JSON.stringify(snaps));}

function saveSnapshot(){
  const snaps=getSnapshots();
  if(snaps.length>=5){showToast('Max 5 snapshots — delete one first','#f59e0b');return;}
  const name=prompt('Scenario name:',S.project.name+' — '+(new Date()).toLocaleDateString());
  if(!name)return;
  const h=hardCost(),t=totalCost(),gsf=getGSF(),keys=getKeys();
  snaps.push({
    name,date:new Date().toISOString(),
    totalCost:t,hardCost:h,perSF:gsf?t/gsf:0,perKey:keys?t/keys:0,gsf,keys,
    markups:{gcFee:S.gcFee,overhead:S.overhead,profit:S.profit,contingency:S.contingency},
    projectType:S.project.type,location:S.locationKey,
    divisions:S.divisions.map(d=>({num:d.num,name:d.name,total:divTotal(d)}))
  });
  setSnapshots(snaps);renderCompareTab();showToast('Scenario saved ✓');
}

function deleteSnapshot(idx){
  const snaps=getSnapshots();snaps.splice(idx,1);setSnapshots(snaps);renderCompareTab();showToast('Deleted');
}

    S.divisions.forEach(d=>{
      const dt=divTotal(d);if(dt===0)return;
      html+=`<tr style="border-bottom:1px solid var(--border)"><td style="padding:3px 8px"><span style="color:var(--lmg)">${d.num}</span> ${d.name}</td><td style="padding:3px 8px;text-align:right;font-weight:600">${fmtN(dt)}</td>`;
      snaps.forEach(s=>{

      });
      html+=`</tr>`;
    });
    html+=`</tbody></table></div>`;
  }
  html+=`</div>`;
  el.innerHTML=html;
}

function renderCharts(){
  const el=$('costChart');if(!el)return;
  const total=hardCost();
  // Build sorted divisions array
  const divs=[];
  S.divisions.forEach(d=>{const dt=divTotal(d);if(dt>0)divs.push({num:d.num,name:d.name,total:dt,pct:(dt/total*100)});});
  divs.sort((a,b)=>b.total-a.total);
  // Brand color scale: navy → orange gradient steps
  const BAR_COLORS=['#00235a','#003380','#ff5e14','#e54d00','#0ea5e9','#1d4ed8','#ff8c42','#475569','#0d9488','#7c3aed','#16a34a','#ca8a04','#be185d','#0891b2','#9333ea','#15803d','#b45309','#0369a1','#c2410c','#1e40af','#065f46','#7e22ce','#92400e'];
  let html='<div style="padding:4px 0">';
  divs.forEach((d,i)=>{
    const barW=Math.max(2,Math.round(d.pct/divs[0].pct*100));
    const col=BAR_COLORS[i%BAR_COLORS.length];
    html+=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:7px">`;
    html+=`<div style="width:90px;font-size:10px;font-weight:700;color:var(--text);text-align:right;flex-shrink:0">Div ${d.num}</div>`;
    html+=`<div style="flex:1;background:var(--surface-alt);border-radius:4px;overflow:hidden;height:22px;min-width:0">`;
    html+=`<div style="width:${barW}%;height:100%;background:${col};display:flex;align-items:center;padding-left:8px;min-width:2px">`;
    html+=barW>18?`<span style="font-size:9px;font-weight:700;color:#fff;white-space:nowrap">${d.name.substring(0,22)}</span>`:'';
    html+=`</div></div>`;
    const fullAmt2='$'+d.total.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});
    html+=`<div style="width:100px;font-size:10px;font-weight:700;color:var(--text);flex-shrink:0;font-variant-numeric:tabular-nums">${fullAmt2}</div>`;
    html+=`<div style="width:38px;font-size:10px;color:var(--text-sec);flex-shrink:0;text-align:right">${d.pct.toFixed(1)}%</div>`;
    html+=`</div>`;
  });
  html+='</div>';
  el.innerHTML=html;
}

function exportProCoreBudget(){
  const fd=v=>'$'+Number(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  const z='$0.00';
  const headers=['Budget Code','Description','Original Budget Amount','Approved Budget Changes',
    'Approved COs','Revised Budget','Pending COs','Projected Budget','Committed Costs',
    'Direct Costs','Job to Date Costs','Pending Cost Changes','Projected Costs',
    'Forecast To Complete','Estimated Cost at Completion','Notes','Projected over Under'];

  // Map CSI division number to ProCore budget code + description
  const PROCORE_MAP={
    '01':['01.GEN','General Conditions / Supervision / Temp Facilities'],
    '02':['02.SU','Sitework / Excavation / Utilities / Paving'],
    '03':['03.SC','Concrete (Foundations / Slab / Podium)'],
    '04':['04.O','Masonry (CMU / Veneer)'],
    '05':['05.O','Structural Steel / Misc. Metals'],
    '06':['06.O','Carpentry / Framing / Blocking'],
    '07':['07.O','Roofing / Waterproofing / Insulation'],
    '08':['08.O','Doors / Windows / Storefront / Glazing'],
    '09':['09.Ms D','Finishes – Drywall / Tile / Paint / Carpet / Ceilings'],
    '10':['10.O','Specialties – Signage / Accessories'],
    '11':['11.Eq','Equipment – Laundry / Fitness / Misc.'],
    '12':['12.FF&E','Furnishings / FF&E Allowance'],
    '13':['13.O','Special Construction'],
    '14':['14.El','Elevator / Conveying Equipment'],
    '21':['21.Fire S','Fire Protection Systems'],
    '22':['22.P','Plumbing Systems'],
    '23':['23.HVAC','HVAC Systems'],
    '26':['26.E','Electrical – Power / Lighting / Panels'],
    '27':['27.E','Low Voltage / Data / Security'],
    '28':['28.Fire','Fire Alarm / Access Control'],
    '31':['31.O','Earthwork / Grading'],
    '32':['32.O','Exterior Improvements / Hardscape / Paving'],
    '33':['33.O','Utilities / Drainage / Landscaping']
  };

  const row=(code,desc,amt)=>{
    const a=fd(amt);
    return [code,desc,a,z,z,a,z,a,z,z,z,z,z,a,a,'',z];
  };

  let rows=[headers];
  const h=hardCost();

  // Div 01: GEN REQUIREMENTS includes GC Fee + Overhead + Profit
  let div01Total=0;
  S.divisions.forEach(div=>{
    if(div.num==='01') div01Total=divTotal(div);
  });
  const markup=(h*S.gcFee/100)+(h*S.overhead/100)+(h*S.profit/100);
  rows.push(row('01.GEN','General Conditions / Supervision / Temp Facilities',div01Total+markup));
  rows.push(row('01.CONT',"Owner's Contingency",(h*S.contingency/100)));

  // All other divisions
  S.divisions.forEach(div=>{
    if(div.num==='01') return; // already handled above
    const dt=divTotal(div);
    if(dt<=0) return;
    const map=PROCORE_MAP[div.num]||(div.num+'.O','Division '+div.num);
    rows.push(row(Array.isArray(map)?map[0]:div.num+'.O', Array.isArray(map)?map[1]:div.name, dt));
  });

  // Grand Total
  const total=totalCost();
  rows.push(['Report Grand Total','',fd(total),z,z,fd(total),z,fd(total),z,z,z,z,z,fd(total),fd(total),'',z]);

  const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
  const name=(S.project.name||'Estimate').replace(/[^a-zA-Z0-9]/g,'_');
  downloadFile(csv,'text/csv',name+'_ProCore_Budget.csv');
  showToast('ProCore Budget exported ✓');
}

function exportCSV(){
  // Format dollar amounts with $ sign and comma separators
  const fmtDollar=v=>'$'+Number(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  const fmtNum=v=>Number(v).toLocaleString('en-US');
  let rows=[['Cost Code','Description','Budget Amount','Unit','Quantity','Unit Cost','Labor %','Material %','Confidence']];
  const m=getMult();
  S.divisions.forEach(div=>{
    div.items.forEach(it=>{
      if(it.qty>0||it.cost>0){
        rows.push([div.num+'-'+it.desc.replace(/[^a-zA-Z0-9 ]/g,'').substring(0,35).trim().replace(/ /g,'-'),
          it.desc,fmtDollar(it.qty*it.cost*m),it.unit,fmtNum(it.qty),fmtDollar(it.cost*m),div.laborPct+'%',(100-div.laborPct)+'%',it.confidence]);
      }
    });
    const dt=divTotal(div);
    if(dt>0)rows.push([div.num+'-SUBTOTAL','Div '+div.num+' — '+div.name+' Total',fmtDollar(dt),'LS','1',fmtDollar(dt),'','','']);
  });
  const h=hardCost();
  rows.push(['GC-FEE','GC Fee ('+S.gcFee+'%)',fmtDollar(h*S.gcFee/100),'LS','1',fmtDollar(h*S.gcFee/100),'','','']);
  rows.push(['OH','Overhead ('+S.overhead+'%)',fmtDollar(h*S.overhead/100),'LS','1',fmtDollar(h*S.overhead/100),'','','']);
  rows.push(['PR','Profit ('+S.profit+'%)',fmtDollar(h*S.profit/100),'LS','1',fmtDollar(h*S.profit/100),'','','']);
  rows.push(['CONT',"Owner's Contingency ("+S.contingency+'%)',fmtDollar(h*S.contingency/100),'LS','1',fmtDollar(h*S.contingency/100),'','','']);
  rows.push(['TOTAL','TOTAL PROJECT COST',fmtDollar(totalCost()),'LS','1',fmtDollar(totalCost()),'','','']);

  const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
  downloadFile(csv,'text/csv',(S.project.name||'Estimate').replace(/[^a-zA-Z0-9]/g,'_')+'_ProCore.csv');
  showToast('CSV exported ✓');
}

function getSchedulePhases(){
  const gsf=getGSF();const keys=getKeys();
  const type=S.project.type||'';
  // Scale factor: 1.0 for 60K SF, scales linearly
  const sf=Math.max(0.7,Math.min(1.8,gsf/60000));
  // Key factor: minor adjustment
  const kf=Math.max(0.8,Math.min(1.3,keys/125));
  const r=(lo,hi)=>Math.round((lo+(hi-lo)*((sf+kf)/2-0.7)/1.1));
  const phases=[
    {id:'precon',name:'Pre-Construction (Permits, Shop Drawings)',weeks:r(8,12),color:'#6366f1',milestone:null},
    {id:'mob',name:'Mobilization & Site Work',weeks:r(2,4),color:'#0ea5e9',milestone:null},
    {id:'foundation',name:'Foundation & Concrete',weeks:r(4,8),color:'#475569',milestone:'Foundation Complete'},
    {id:'structural',name:'Structural Steel / Framing',weeks:r(6,12),color:'#00235a',milestone:null},
    {id:'roofing',name:'Roofing & Building Envelope',weeks:r(4,6),color:'#0d9488',milestone:'Weathertight'},
    {id:'mep_rough',name:'MEP Rough-In',weeks:r(6,10),color:'#7c3aed',milestone:'MEP Rough Complete'},
    {id:'insulation',name:'Insulation & Drywall',weeks:r(4,8),color:'#ca8a04',milestone:null},
    {id:'finishes',name:'Finishes (Tile, Flooring, Paint)',weeks:r(6,10),color:'#ec4899',milestone:null},
    {id:'mep_trim',name:'MEP Trim-Out',weeks:r(3,5),color:'#8b5cf6',milestone:null},
    {id:'ffe',name:'FF&E & Millwork',weeks:r(3,5),color:'#f59e0b',milestone:null},
    {id:'punch',name:'Punch List & QC',weeks:r(2,3),color:'#10b981',milestone:'Substantial Completion'},
    {id:'final',name:'Final Inspections & CO',weeks:r(2,4),color:'#ef4444',milestone:'Final CO'}
  ];
  // Compute start/end weeks
  let w=0;
  phases.forEach(p=>{
    // overlap: some phases run concurrently
    p.startWeek=w;
    p.endWeek=w+p.weeks;
    w=p.endWeek;
  });
  // Apply overlaps for realism
  // MEP rough overlaps with structural tail, roofing overlaps with structural tail, etc.
  if(phases.length>=6){
    phases[4].startWeek=phases[3].endWeek-2; // roofing starts 2wk before structural done
    phases[4].endWeek=phases[4].startWeek+phases[4].weeks;
    phases[5].startWeek=phases[4].startWeek+2; // MEP rough starts 2wk into roofing
    phases[5].endWeek=phases[5].startWeek+phases[5].weeks;
    phases[6].startWeek=phases[5].startWeek+Math.floor(phases[5].weeks*0.6);
    phases[6].endWeek=phases[6].startWeek+phases[6].weeks;
    phases[7].startWeek=phases[6].startWeek+Math.floor(phases[6].weeks*0.5);
    phases[7].endWeek=phases[7].startWeek+phases[7].weeks;
    phases[8].startWeek=phases[7].startWeek+Math.floor(phases[7].weeks*0.6);
    phases[8].endWeek=phases[8].startWeek+phases[8].weeks;
    phases[9].startWeek=phases[8].startWeek+2;
    phases[9].endWeek=phases[9].startWeek+phases[9].weeks;
    phases[10].startWeek=Math.max(phases[8].endWeek,phases[9].endWeek)-1;
    phases[10].endWeek=phases[10].startWeek+phases[10].weeks;
    phases[11].startWeek=phases[10].endWeek;
    phases[11].endWeek=phases[11].startWeek+phases[11].weeks;
  }
  return phases;
}

function getTotalScheduleWeeks(phases){
  return phases.reduce((mx,p)=>Math.max(mx,p.endWeek),0);
}

function addWeeksToDate(dateStr,weeks){
  if(!dateStr)return'';
  const d=new Date(dateStr+'T00:00:00');
  d.setDate(d.getDate()+weeks*7);
  return d.toISOString().split('T')[0];
}

function formatDateShort(dateStr){
  if(!dateStr)return'—';
  const d=new Date(dateStr+'T00:00:00');
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit'});
}

          <span style="font-size:9px;font-weight:700;color:#fff;white-space:nowrap">${p.weeks}w (Wk ${p.startWeek+1}–${p.endWeek})</span>

    if(p.milestone){
      const mileX=(p.endWeek)*colW-6;
      html+=`<div style="position:absolute;left:${mileX}px;top:-2px;width:0;height:0;border:8px solid transparent;border-bottom-color:${p.color};transform:rotate(45deg)" title="${p.milestone}"></div>`;
    }
    html+=`</div></div>`;
  });

  // Grid lines
  html+=`</div></div></div>`;

  // MILESTONES TABLE
  html+=`<div class="card">
    <div class="card-title">🏁 Key Milestones</div>
    <table style="width:100%;border-collapse:collapse;font-size:12px">
      <thead><tr>
        <th style="text-align:left;padding:6px 8px;font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-sec);border-bottom:2px solid var(--border)">Milestone</th>
        <th style="text-align:center;padding:6px 8px;font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-sec);border-bottom:2px solid var(--border)">Week</th>
        <th style="text-align:center;padding:6px 8px;font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-sec);border-bottom:2px solid var(--border)">Target Date</th>
        <th style="text-align:left;padding:6px 8px;font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-sec);border-bottom:2px solid var(--border)">Phase</th>
      </tr></thead><tbody>`;
  phases.filter(p=>p.milestone).forEach(p=>{
    html+=`<tr style="border-bottom:1px solid var(--border)">
      <td style="padding:6px 8px;font-weight:700"><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:${p.color};margin-right:6px"></span>${p.milestone}</td>
      <td style="padding:6px 8px;text-align:center;font-weight:600">Week ${p.endWeek}</td>
      <td style="padding:6px 8px;text-align:center">${startDate?formatDateShort(addWeeksToDate(startDate,p.endWeek)):'—'}</td>
      <td style="padding:6px 8px;color:var(--text-sec)">${p.name}</td>
    </tr>`;
  });
  html+=`</tbody></table></div>`;

  // PHASE DETAIL TABLE
  html+=`<div class="card">
    <div class="card-title">📋 Phase Detail</div>
    <table style="width:100%;border-collapse:collapse;font-size:12px">
      <thead><tr>
        <th style="text-align:left;padding:6px 8px;font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-sec);border-bottom:2px solid var(--border)">Phase</th>
        <th style="text-align:center;padding:6px 8px;font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-sec);border-bottom:2px solid var(--border)">Duration</th>
        <th style="text-align:center;padding:6px 8px;font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-sec);border-bottom:2px solid var(--border)">Start Week</th>
        <th style="text-align:center;padding:6px 8px;font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-sec);border-bottom:2px solid var(--border)">End Week</th>
        <th style="text-align:center;padding:6px 8px;font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-sec);border-bottom:2px solid var(--border)">Start Date</th>
        <th style="text-align:center;padding:6px 8px;font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-sec);border-bottom:2px solid var(--border)">End Date</th>
      </tr></thead><tbody>`;
  phases.forEach(p=>{
    html+=`<tr style="border-bottom:1px solid var(--border)">
      <td style="padding:5px 8px;font-weight:600"><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:${p.color};margin-right:6px"></span>${p.name}</td>
      <td style="padding:5px 8px;text-align:center;font-weight:700">${p.weeks} weeks</td>
      <td style="padding:5px 8px;text-align:center">Wk ${p.startWeek+1}</td>
      <td style="padding:5px 8px;text-align:center">Wk ${p.endWeek}</td>
      <td style="padding:5px 8px;text-align:center">${startDate?formatDateShort(addWeeksToDate(startDate,p.startWeek)):'—'}</td>
      <td style="padding:5px 8px;text-align:center">${startDate?formatDateShort(addWeeksToDate(startDate,p.endWeek)):'—'}</td>
    </tr>`;
  });
  html+=`</tbody></table></div>`;

  el.innerHTML=html;

  // Bind start date
  const sdInput=$('schedStartDate');
  if(sdInput)sdInput.addEventListener('change',e=>{S.schedule.startDate=e.target.value;saveState();renderScheduleTab();});
}

function exportSchedulePDF(){
  const pw=window.open('','_blank');
  if(!pw){showToast('Pop-up blocked','#ef4444');return;}
  const phases=getSchedulePhases();
  const totalWeeks=getTotalScheduleWeeks(phases);
  const startDate=S.schedule.startDate||'';
  const _logoEl=document.querySelector('header img');
  const LOGO_SRC=_logoEl?(_logoEl.getAttribute('src')||_logoEl.src||''):(typeof __LMG_LOGO!=='undefined'?__LMG_LOGO:'');

  let html=`<!DOCTYPE html><html><head><title>LMG Schedule — ${esc(S.project.name)}</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}body{font-family:'Inter',sans-serif;font-size:11px;color:#222;padding:0.5in}
    h2{font-size:14px;color:#ff5e14;margin:20px 0 8px;border-bottom:2px solid #ff5e14;padding-bottom:4px;text-transform:uppercase}
    table{width:100%;border-collapse:collapse;margin-bottom:16px}
    th{background:#00235a;color:#fff;padding:5px 8px;text-align:left;font-size:9px;text-transform:uppercase}
    td{padding:4px 8px;border-bottom:1px solid #e5e5e5;font-size:10px}
    @page{margin:0.4in;size:letter landscape}
  </style></head><body>`;

  html+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:3px solid #ff5e14">
    ${LOGO_SRC?'<img src="'+LOGO_SRC+'" style="height:50px">':'<div style="font-size:28px;font-weight:900;color:#ff5e14">LMG</div>'}
    <div style="text-align:right;font-size:10px"><strong>${esc(S.project.name)}</strong><br>Construction Schedule · ${totalWeeks} Weeks · ${startDate?formatDateShort(startDate)+' — '+formatDateShort(addWeeksToDate(startDate,totalWeeks)):''}</div>
  </div>`;

  html+=`<h2>Phase Schedule</h2><table><thead><tr><th>Phase</th><th>Duration</th><th>Start</th><th>End</th><th>Milestone</th></tr></thead><tbody>`;
  phases.forEach(p=>{
    html+=`<tr><td><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${p.color};margin-right:4px"></span>${p.name}</td>
      <td>${p.weeks} wks</td><td>Wk ${p.startWeek+1}${startDate?' ('+formatDateShort(addWeeksToDate(startDate,p.startWeek))+')':''}</td>
      <td>Wk ${p.endWeek}${startDate?' ('+formatDateShort(addWeeksToDate(startDate,p.endWeek))+')':''}</td>
      <td style="font-weight:${p.milestone?'700':'400'};color:${p.milestone?'#ff5e14':'#999'}">${p.milestone||'—'}</td></tr>`;
  });
  html+=`<tr style="background:#f3f4f6;font-weight:700"><td>TOTAL PROJECT DURATION</td><td>${totalWeeks} weeks (${Math.round(totalWeeks/4.33)} months)</td><td colspan="3"></td></tr>`;
  html+=`</tbody></table></body></html>`;
  pw.document.write(html);pw.document.close();
  setTimeout(()=>pw.print(),600);
}

function renderPMTab(){
  const el=$('tabPm');
  let html='';

  // ---- SECTION A: Budget vs Actuals ----
  html+=`<div class="card">
    <div class="card-title" style="justify-content:space-between">💰 Budget vs Actuals Tracker
      <button class="btn btn-outline btn-sm" onclick="exportActualsCSV()">📄 Export CSV</button>
    </div>`;

  let totalBudget=0,totalCommitted=0,totalActual=0,totalForecast=0;

  html+=`<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:11px;min-width:900px">
    <thead><tr>
      <th style="text-align:left;padding:6px;font-size:9px;font-weight:700;text-transform:uppercase;color:var(--text-sec);border-bottom:2px solid var(--border)">Division</th>
      <th style="text-align:right;padding:6px;font-size:9px;font-weight:700;text-transform:uppercase;color:var(--text-sec);border-bottom:2px solid var(--border)">Budget</th>
      <th style="text-align:right;padding:6px;font-size:9px;font-weight:700;text-transform:uppercase;color:var(--text-sec);border-bottom:2px solid var(--border)">Committed</th>
      <th style="text-align:right;padding:6px;font-size:9px;font-weight:700;text-transform:uppercase;color:var(--text-sec);border-bottom:2px solid var(--border)">Actual To Date</th>
      <th style="text-align:right;padding:6px;font-size:9px;font-weight:700;text-transform:uppercase;color:var(--text-sec);border-bottom:2px solid var(--border)">Forecast</th>
      <th style="text-align:right;padding:6px;font-size:9px;font-weight:700;text-transform:uppercase;color:var(--text-sec);border-bottom:2px solid var(--border)">Variance</th>
      <th style="text-align:center;padding:6px;font-size:9px;font-weight:700;text-transform:uppercase;color:var(--text-sec);border-bottom:2px solid var(--border)">% Complete</th>
      <th style="text-align:center;padding:6px;font-size:9px;font-weight:700;text-transform:uppercase;color:var(--text-sec);border-bottom:2px solid var(--border)">Status</th>
    </tr></thead><tbody>`;

  S.divisions.forEach((div,di)=>{
    const budget=divTotal(div);
    if(budget===0)return;
    const a=S.actuals[div.num]||{};
    const committed=a.committed||0;
    const actual=a.actual||0;
    const forecast=a.forecast||(committed||budget);
    const variance=budget-forecast;
    const pctComplete=a.pctComplete||0;
    const statusColor=variance>=0?(variance>budget*0.05?'var(--green)':'var(--yellow)'):'var(--red)';
    const statusLabel=variance>=0?(variance>budget*0.05?'Under Budget':'On Budget'):'Over Budget';
    const statusBg=variance>=0?(variance>budget*0.05?'rgba(16,185,129,.1)':'rgba(245,158,11,.1)'):'rgba(239,68,68,.1)';

    totalBudget+=budget;totalCommitted+=committed;totalActual+=actual;totalForecast+=forecast;

    html+=`<tr style="border-bottom:1px solid var(--border)">
      <td style="padding:5px 6px;font-weight:600"><span style="color:var(--lmg)">${div.num}</span> ${div.name}</td>
      <td style="padding:5px 6px;text-align:right;font-weight:600;color:var(--text-sec)">${fmt(budget)}</td>
      <td style="padding:5px 6px;text-align:right"><input type="number" value="${committed||''}" data-actual="${div.num}.committed" style="width:90px;padding:3px 6px;border:1px solid var(--border);border-radius:4px;font-size:11px;text-align:right;background:var(--input-bg);color:var(--text)" placeholder="$0"></td>
      <td style="padding:5px 6px;text-align:right"><input type="number" value="${actual||''}" data-actual="${div.num}.actual" style="width:90px;padding:3px 6px;border:1px solid var(--border);border-radius:4px;font-size:11px;text-align:right;background:var(--input-bg);color:var(--text)" placeholder="$0"></td>
      <td style="padding:5px 6px;text-align:right"><input type="number" value="${forecast||''}" data-actual="${div.num}.forecast" style="width:90px;padding:3px 6px;border:1px solid var(--border);border-radius:4px;font-size:11px;text-align:right;background:var(--input-bg);color:var(--text)" placeholder="$0"></td>
      <td style="padding:5px 6px;text-align:right;font-weight:700;color:${statusColor}">${variance>=0?'+':''}${fmt(variance)}</td>
      <td style="padding:5px 6px">
        <div style="display:flex;align-items:center;gap:4px">
          <input type="range" min="0" max="100" value="${pctComplete}" data-actual="${div.num}.pctComplete" style="width:60px;accent-color:var(--lmg)">
          <span style="font-size:11px;font-weight:700;min-width:30px;text-align:right">${pctComplete}%</span>
        </div>
        <div style="height:4px;background:var(--border);border-radius:2px;margin-top:2px"><div style="height:4px;background:var(--lmg);border-radius:2px;width:${pctComplete}%"></div></div>
      </td>
      <td style="padding:5px 6px;text-align:center"><span style="display:inline-block;padding:2px 8px;border-radius:12px;font-size:9px;font-weight:700;background:${statusBg};color:${statusColor}">${statusLabel}</span></td>
    </tr>`;
  });

  const totalVariance=totalBudget-totalForecast;
  html+=`<tr style="background:var(--surface-alt);font-weight:700;border-top:2px solid var(--border)">
    <td style="padding:8px 6px">TOTALS</td>
    <td style="padding:8px 6px;text-align:right">${fmt(totalBudget)}</td>
    <td style="padding:8px 6px;text-align:right">${fmt(totalCommitted)}</td>
    <td style="padding:8px 6px;text-align:right">${fmt(totalActual)}</td>
    <td style="padding:8px 6px;text-align:right">${fmt(totalForecast)}</td>
    <td style="padding:8px 6px;text-align:right;font-weight:700;color:${totalVariance>=0?'var(--green)':'var(--red)'}">${totalVariance>=0?'+':''}${fmt(totalVariance)}</td>
    <td colspan="2"></td>
  </tr>`;
  html+=`</tbody></table></div></div>`;

  // ---- SECTION B: Change Orders ----
  html+=`<div class="card">
    <div class="card-title" style="justify-content:space-between">📝 Change Order Log
      <div style="display:flex;gap:8px">
        <button class="btn btn-outline btn-sm" onclick="exportCOCSV()">📄 Export CSV</button>
        <button class="btn btn-primary btn-sm" onclick="addChangeOrder()">+ Add CO</button>
      </div>
    </div>`;

  const cos=S.changeOrders||[];
  const approved=cos.filter(c=>c.status==='Approved').reduce((s,c)=>s+(c.amount||0),0);
  const pending=cos.filter(c=>c.status==='Pending').reduce((s,c)=>s+(c.amount||0),0);
  const originalContract=totalCost();

  html+=`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px">

    html+=`<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:11px;min-width:700px">

        <th style="text-align:left;padding:6px;font-size:9px;font-weight:700;text-transform:uppercase;color:var(--text-sec);border-bottom:2px solid var(--border)">Division</th>

        <td style="padding:4px 6px;text-align:right"><input type="number" value="${to.unitCost||''}" data-toff="${ti}.unitCost" style="width:70px;padding:2px 4px;border:1px solid var(--border);border-radius:4px;font-size:11px;text-align:right;background:var(--input-bg);color:var(--text)"></td>

        <td style="padding:4px 6px"><input value="${esc(to.vendor||'')}" data-toff="${ti}.vendor" style="width:100%;padding:2px 4px;border:1px solid var(--border);border-radius:4px;font-size:11px;background:var(--input-bg);color:var(--text)" placeholder="Vendor"></td>

      </tr>`;
    });
    html+=`<tr style="background:var(--surface-alt);font-weight:700;border-top:2px solid var(--border)">
      <td colspan="5" style="padding:8px 6px;text-align:right">TOTAL</td>
      <td style="padding:8px 6px;text-align:right;font-size:13px;color:var(--lmg)">${fmt(toTotal)}</td>
      <td colspan="3"></td>
    </tr>`;
    html+=`</tbody></table></div>`;
  }else{
    html+=`<div style="text-align:center;padding:32px;color:var(--text-sec)">No take-off items yet. Click "+ Add Item" to start.</div>`;
  }
  html+=`</div>`;

  el.innerHTML=html;

  // Bind actuals events
  el.addEventListener('input',e=>{
    const ak=e.target.dataset.actual;
    if(ak){
      const[num,field]=ak.split('.');
      if(!S.actuals[num])S.actuals[num]={};
      S.actuals[num][field]=Number(e.target.value)||0;
      if(field==='pctComplete'){
        const sp=e.target.closest('td').querySelector('span');
        if(sp)sp.textContent=e.target.value+'%';
        const bar=e.target.closest('td').querySelector('div > div');
        if(bar)bar.style.width=e.target.value+'%';
      }
      saveState();return;
    }
    const ck=e.target.dataset.co;
    if(ck){
      const[idx,field]=ck.split('.');
      if(field==='amount')S.changeOrders[+idx][field]=Number(e.target.value)||0;
      else S.changeOrders[+idx][field]=e.target.value;
      saveState();return;
    }
    const tk=e.target.dataset.toff;
    if(tk){
      const[idx,field]=tk.split('.');
      if(field==='qty'||field==='unitCost')S.takeoffs[+idx][field]=Number(e.target.value)||0;
      else S.takeoffs[+idx][field]=e.target.value;
      saveState();
    }
  });
  el.addEventListener('change',e=>{
    const ck=e.target.dataset.co;
    if(ck){
      const[idx,field]=ck.split('.');
      S.changeOrders[+idx][field]=e.target.value;
      saveState();renderPMTab();
    }
  });
}

function exportActualsCSV(){
  let rows=[['Division','Budget','Committed','Actual To Date','Forecast','Variance','% Complete']];
  S.divisions.forEach(div=>{
    const budget=divTotal(div);if(budget===0)return;
    const a=S.actuals[div.num]||{};
    const forecast=a.forecast||(a.committed||budget);
    rows.push([div.num+' '+div.name,budget,a.committed||0,a.actual||0,forecast,budget-forecast,a.pctComplete||0]);
  });
  const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
  downloadFile(csv,'text/csv',(S.project.name||'Project').replace(/[^a-zA-Z0-9]/g,'_')+'_Actuals.csv');
  showToast('Actuals CSV exported ✓');
}

function exportCOCSV(){
  let rows=[['CO #','Date','Description','Subcontractor','Amount','Status']];
  (S.changeOrders||[]).forEach((co,i)=>{
    rows.push(['CO-'+String(i+1).padStart(3,'0'),co.date||'',co.description||'',co.sub||'',co.amount||0,co.status||'']);
  });
  const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
  downloadFile(csv,'text/csv',(S.project.name||'Project').replace(/[^a-zA-Z0-9]/g,'_')+'_ChangeOrders.csv');
  showToast('CO Log exported ✓');
}

function exportTakeoffCSV(){
  let rows=[['Division','Description','Unit','Qty','Unit Cost','Total','Vendor','Notes']];
  (S.takeoffs||[]).forEach(to=>{
    rows.push([to.division||'',to.desc||'',to.unit||'',to.qty||0,to.unitCost||0,(to.qty||0)*(to.unitCost||0),to.vendor||'',to.notes||'']);
  });
  const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
  downloadFile(csv,'text/csv',(S.project.name||'Project').replace(/[^a-zA-Z0-9]/g,'_')+'_TakeOffs.csv');
  showToast('Take-offs CSV exported ✓');
}
